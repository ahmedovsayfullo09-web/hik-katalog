<!-- MODAL: PASSWORD CHECK (NEW) -->

<!-- MODAL: ADD PRODUCT -->

        <label class="block w-full h-40 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center bg-gray-50 dark:bg-gray-800 cursor-pointer mb-4">

            <textarea id="inp-desc" rows="3" placeholder="Xarakteristikasi..." class="w-full border rounded-lg p-3 dark:bg-gray-800 dark:border-gray-700 dark:text-white text-sm"></textarea>
            <button onclick="addNewProduct()" class="w-full bg-primary text-white font-bold py-3 rounded-xl" data-i18n="save">Saqlash</button>
        </div>
        <button onclick="closeModal('modal-add-product')" class="absolute top-4 right-4 text-gray-500">X</button>

<!-- MODAL: EDIT PROFILE -->
<div class="fixed inset-0 z-[80] bg-black/50 modal-overlay" id="modal-edit-profile">
    <div class="modal-content absolute bottom-0 left-0 right-0 bg-white dark:bg-gray-900 rounded-t-3xl p-6">
        <h3 class="font-bold text-xl mb-4 dark:text-white" data-i18n="edit_prof">Profilni o'zgartirish</h3>
        <input type="text" id="inp-store-name" placeholder="Do'kon nomi" class="w-full border rounded-lg p-3 mb-3 dark:bg-gray-800 dark:border-gray-700 dark:text-white">

<!-- MODAL: CHANGE LOGO -->
<div class="fixed inset-0 z-[80] bg-black/50 modal-overlay" id="modal-logo">
    <div class="modal-content absolute bottom-0 left-0 right-0 bg-white dark:bg-gray-900 rounded-t-3xl p-6">
        <h3 class="font-bold text-xl mb-4 dark:text-white" data-i18n="change_logo">Logotipni O'zgartirish</h3>
        <label class="block w-full h-40 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center bg-gray-50 dark:bg-gray-800 cursor-pointer mb-4">
            <input type="file" id="logo-file-btn" class="hidden" accept="image/*" onchange="handleLogoUpload(event)">
            <img id="logo-preview" class="hidden w-full h-full object-contain p-4">
            <div id="logo-placeholder" class="text-center"><span class="material-symbols-outlined text-3xl text-gray-400">image</span><p class="text-xs text-gray-500 mt-1">Logotipni tanlang</p></div>
        </label>
        <button onclick="saveLogo()" class="w-full bg-primary text-white font-bold py-3 rounded-xl" data-i18n="save">Saqlash</button>
        <button onclick="closeModal('modal-logo')" class="absolute top-4 right-4 text-gray-500">X</button>
    </div>
</div>

<script>
    let state = {
        products: [
            { id: 1, name: "Hikvision Dome 4MP", price: 850000, cat: "CAM", img: "https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=500", desc: "4MP, IR 30m, Dome kamera." },
            { id: 2, name: "Hikvision NVR 8CH", price: 2100000, cat: "DVR", img: "https://images.unsplash.com/photo-1558346490-a72e53ae2d4f?w=500", desc: "8 Kanalli, 4K qayd qilish." }
        ],
        cart: [],
        settings: { darkMode: false, lang: 'uz' },
        profile: { storeName: "Hikvision Store", adminName: "Sayfulloh" },
        customLogo: null,
        currentFilter: 'ALL'
    };
    let tempImg = null;
    let tempLogo = null;

    try { if(localStorage.getItem('hik_sayfulloh')) { const saved = JSON.parse(localStorage.getItem('hik_sayfulloh')); state = { ...state, ...saved }; } } catch(e) {}

    function saveState() { try { localStorage.setItem('hik_sayfulloh', JSON.stringify(state)); } catch(e) { showToast("Xotira to'ldi!"); } }
    function setLang(lang) { state.settings.lang = lang; saveState(); applyLang(); }
    function applyLang() { const t = i18n[state.settings.lang]; document.querySelectorAll('[data-i18n]').forEach(el => { if(t[el.dataset.i18n]) el.innerText = t[el.dataset.i18n]; }); renderShop(); renderCart(); }
    function enterApp() { document.getElementById('splash-screen').classList.add('hidden-splash'); init(); }
    
    // --- AUTHENTICATION LOGIC ---
    function checkAuthAndNavigate(page) {
        // Profil sahifasiga kirishda parol so'rash
        document.getElementById('inp-password').value = "";
        openModal('modal-password');
    }

    function verifyPassword() {
        const inputPass = document.getElementById('inp-password').value;
        if(inputPass === ADMIN_PASS) {
            closeModal('modal-password');
            navigate('profile');
            showToast("Hush kelibsiz, Admin!");
        } else {
            showToast(i18n[state.settings.lang].wrong_pass);
            document.getElementById('inp-password').value = "";
        }
    }

    function navigate(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(btn => { 
            btn.classList.toggle('text-primary', btn.dataset.page === page); 
            btn.classList.toggle('text-gray-400', btn.dataset.page !== page); 
        });
        if(page === 'shop') renderShop(); if(page === 'bag') renderCart();
    }

    function openModal(id) {
        if(id === 'modal-edit-profile') { document.getElementById('inp-store-name').value = state.profile.storeName; document.getElementById('inp-admin-name').value = state.profile.adminName; }
        document.getElementById(id).classList.add('show');
    }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    // --- IMAGE & PRODUCT LOGIC ---
    function handleImageUpload(event) {
        const file = event.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600; let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                const isLogo = event.target.id === 'logo-file-btn';
                if(isLogo) { tempLogo = dataUrl; document.getElementById('logo-preview').src = tempLogo; document.getElementById('logo-preview').classList.remove('hidden'); document.getElementById('logo-placeholder').classList.add('hidden'); }
                else { tempImg = dataUrl; document.getElementById('img-preview').src = tempImg; document.getElementById('img-preview').classList.remove('hidden'); document.getElementById('img-placeholder').classList.add('hidden'); }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function addNewProduct() {
        const name = document.getElementById('inp-name').value; const price = document.getElementById('inp-price').value; const cat = document.getElementById('inp-cat').value; const desc = document.getElementById('inp-desc').value;
        if(!name || !price) return showToast("Ism va narxni kiriting");
        state.products.unshift({ id: Date.now(), name, price: parseInt(price), cat, desc: desc || "Ma'lumot yo'q", img: tempImg || "https://placehold.co/600x600/eee/999?text=No+Img" });
        saveState(); closeModal('modal-add-product'); renderShop(); showToast(i18n[state.settings.lang].saved);
        document.getElementById('inp-name').value = ""; document.getElementById('inp-price').value = ""; document.getElementById('inp-desc').value = ""; tempImg = null; document.getElementById('img-preview').classList.add('hidden'); document.getElementById('img-placeholder').classList.remove('hidden');
    }

    function saveProfile() {
        const name = document.getElementById('inp-store-name').value; const admin = document.getElementById('inp-admin-name').value;
        if(name) state.profile.storeName = name; if(admin) state.profile.adminName = admin;
        updateProfileUI(); saveState(); closeModal('modal-edit-profile'); showToast(i18n[state.settings.lang].saved);
    }
    function saveLogo() { if(tempLogo) state.customLogo = tempLogo; saveState(); updateProfileUI(); closeModal('modal-logo'); showToast(i18n[state.settings.lang].saved); }
    function updateProfileUI() {
        const logo = state.customLogo || DEFAULT_LOGO;
        document.getElementById('header-logo').src = logo; document.getElementById('profile-img-placeholder').src = logo;
        document.getElementById('header-brand').innerText = state.profile.storeName; document.getElementById('header-admin').innerText = state.profile.adminName;
        document.getElementById('profile-store-name').innerText = state.profile.storeName; document.getElementById('profile-admin-name').innerText = state.profile.adminName;
    }

    function renderShop() {
        const grid = document.getElementById('catalog-grid'); let items = state.products;
        if(state.currentFilter !== 'ALL') items = items.filter(p => p.cat === state.currentFilter);
        document.querySelectorAll('.cat-pill').forEach(btn => {
            if(btn.dataset.filter === state.currentFilter) btn.className = "cat-pill px-4 py-2 rounded-full bg-primary text-white text-sm font-bold whitespace-nowrap";
            else btn.className = "cat-pill px-4 py-2 rounded-full bg-white dark:bg-gray-800 text-gray-600 border border-gray-200 dark:border-gray-700 text-sm font-bold whitespace-nowrap";
        });
        grid.innerHTML = items.map(p => `
            <div class="bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-sm border border-gray-100 dark:border-gray-700" onclick="viewProduct(${p.id})">
                <div class="aspect-square bg-gray-100"><img src="${p.img}" class="w-full h-full object-cover"></div>
                <div class="p-3"><h4 class="font-bold text-sm truncate dark:text-white">${p.name}</h4><p class="font-bold text-primary mt-1">${formatMoney(p.price)}</p></div>
            </div>`).join('');
    }
    function filterByCategory(cat) { state.currentFilter = cat; navigate('shop'); }

    function renderCart() {
        const list = document.getElementById('cart-list'); const empty = document.getElementById('cart-empty');
        if(state.cart.length === 0) { list.innerHTML = ""; empty.classList.remove('hidden'); return; }
        empty.classList.add('hidden'); let total = 0;
        list.innerHTML = state.cart.map(item => {
            total += item.price * item.qty;
            return `<div class="bg-white dark:bg-gray-800 p-3 rounded-xl flex gap-3 items-center shadow-sm">
                <img src="${item.img}" class="w-16 h-16 rounded-lg object-cover">
                <div class="flex-1"><h4 class="font-bold text-sm dark:text-white">${item.name}</h4><p class="text-xs text-gray-500">${formatMoney(item.price)}</p>
                    <div class="flex items-center gap-3 mt-1">
                        <button onclick="changeQty(${item.id}, -1)" class="w-6 h-6 bg-gray-100 rounded text-xs">-</button>
                        <span class="text-xs font-bold">${item.qty}</span>
                        <button onclick="changeQty(${item.id}, 1)" class="w-6 h-6 bg-gray-100 rounded text-xs">+</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        list.innerHTML += `<div class="fixed bottom-20 left-0 right-0 p-4 bg-white border-t dark:bg-gray-900 dark:border-gray-700 z-40"><div class="max-w-md mx-auto"><div class="flex justify-between mb-3"><span class="text-gray-500" data-i18n="total">${i18n[state.settings.lang].total}</span><span class="font-bold text-xl dark:text-white">${formatMoney(total)}</span></div><a href="#" onclick="sendToTelegram(); return false;" class="w-full bg-[#0088cc] text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 block text-center"><span class="material-symbols-outlined text-sm">send</span> ${i18n[state.settings.lang].buy_btn}</a></div></div>`;
    }
    function viewProduct(id) {
        const p = state.products.find(x => x.id === id); if(!p) return;
        const existing = state.cart.find(i => i.id === id);
        if(existing) existing.qty++; else state.cart.push({ ...p, qty: 1 });
        saveState(); updateBadges(); showToast(i18n[state.settings.lang].added);
    }
    function changeQty(id, val) {
        const item = state.cart.find(i => i.id === id);
        if(item) { item.qty += val; if(item.qty <= 0) state.cart = state.cart.filter(i => i.id !== id); }
        saveState(); renderCart(); updateBadges();
    }
    function updateBadges() {
        const count = state.cart.reduce((a, b) => a + b.qty, 0);
        document.getElementById('header-badge').innerText = count; document.getElementById('nav-badge').innerText = count;
        ['header-badge', 'nav-badge'].forEach(id => { document.getElementById(id).classList.toggle('hidden', count === 0); });
    }
    function sendToTelegram() {
        if(state.cart.length === 0) return;
        let text = "🛒 *Yangi Buyurtma!*\n\n"; let total = 0;
        state.cart.forEach((item, i) => { const sum = item.price * item.qty; total += sum; text += `${i+1}. ${item.name}\n   Miqdor: ${item.qty} ta\n   Narx: ${formatMoney(sum)}\n\n`; });
        text += `💰 *Jami: ${formatMoney(total)}*`;
        window.open(`https://t.me/${OWNER_USERNAME}?text=${encodeURIComponent(text)}`, '_blank');
        state.cart = []; saveState(); updateBadges(); renderCart();
    }
    function clearAllData() { if(confirm("Hamma narsani o'chirishni xohlaysizmi?")) { localStorage.removeItem('hik_sayfulloh'); location.reload(); } }

    // --- CSV IMPORT ---
    function handleCSVUpload(event) {
        const file = event.target.files[0]; if (!file) return;
        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let count = 0;
                results.data.forEach(row => {
                    const name = row["Nomi"] || row["Name"];
                    const price = row["Narxi"] || row["Price"];
                    const cat = row["Kategoriya"] || row["Cat"];
                    const desc = row["Xarakteristika"] || row["Desc"];
                    const img = row["Rasm"] || row["Img"];
                    if(name && price && cat) {
                        state.products.push({
                            id: Date.now() + Math.random(),
                            name: name,
                            price: parseInt(price),
                            cat: cat.toUpperCase(),
                            desc: desc || "Ma'lumot yo'q",
                            img: img || "https://placehold.co/600x600?text=No+Image"
                        });
                        count++;
                    }
                });
                saveState(); renderShop(); showToast(`${count} ta mahsulot qo'shildi!`);
                document.getElementById('csv-file-btn').value = "";
            }
        });
    }

    function formatMoney(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " so'm"; }
    function showToast(msg) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    function init() { applyLang(); updateProfileUI(); renderShop(); updateBadges(); if(state.settings.darkMode) document.documentElement.classList.add('dark'); }
    init();
</script>
